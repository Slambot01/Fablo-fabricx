# Generated by Fablo (poc/fabric-x-integration)
# Input: schema/fablo-config-fabricx.json
# Engine: fabric-x
#
# Architecture:
#   committer-test-node  — bundles orderer + committer + db + query service
#   endorser1, endorser2 — FSC nodes, build from context, websocket P2P mesh

version: "2.4"

networks:
  fabricx:
    name: fabricx

services:

  # ── Committer Test Node ─────────────────────────────────────────────────────
  # Bundles: Orderer (7050) + Committer Sidecar (4001) + Query Service (7001)
  # Image is pre-built — only pre-built image in a Fabric-X network
  # FSC endorser nodes connect to this at committer-sidecar:4001
  # ───────────────────────────────────────────────────────────────────────────
  committer-test-node:
    image: ghcr.io/hyperledger/fabric-x-committer-test-node:0.1.7
    environment:
      # Sidecar identity
      - SC_SIDECAR_ORDERER_IDENTITY_MSP_DIR=/root/config/crypto/peerOrganizations/org1.example.com/peers/SC.org1.example.com/msp
      - SC_SIDECAR_ORDERER_IDENTITY_MSP_ID=Org1MSP
      # Channel + block config
      - SC_SIDECAR_ORDERER_CHANNEL_ID=mychannel
      - SC_SIDECAR_ORDERER_SIGNED_ENVELOPES=true
      - SC_ORDERER_BLOCK_SIZE=1
      # Query service
      - SC_QUERY_SERVICE_SERVER_ENDPOINT=:7001
      # Logging per component
      - SC_SIDECAR_LOGGING_LEVEL=DEBUG
      - SC_QUERY_SERVICE_LOGGING_LEVEL=DEBUG
      - SC_COORDINATOR_LOGGING_LEVEL=DEBUG
      - SC_ORDERER_LOGGING_LEVEL=DEBUG
      - SC_VC_LOGGING_LEVEL=DEBUG
      - SC_VERIFIER_LOGGING_LEVEL=INFO
    ports:
      - 4001:4001   # committer sidecar — FSC nodes submit txs here
      - 7050:7050   # orderer
      - 7001:7001   # query service
      - 5433:5433   # database
    volumes:
      - ./crypto:/root/config/crypto
      - ./sc-genesis-block.proto.bin:/root/config/sc-genesis-block.proto.bin
    networks:
      fabricx:
        aliases:
          - committer-sidecar
          - committer-queryservice
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "4001"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── FSC Endorser 1 ──────────────────────────────────────────────────────────
  # Fabric Smart Client node — NOT a standard Fabric peer
  # Builds from context: no pre-built endorser image available
  # Communicates with other FSC nodes via websocket P2P (port 9301)
  # Connects to committer sidecar at committer-sidecar:4001 for tx submission
  # ───────────────────────────────────────────────────────────────────────────
  endorser1:
    build:
      context: .
      args:
        - NODE_TYPE=endorser
    environment:
      - CORE_FSC_ID=endorser1
      - CORE_P2P_LISTENADDRESS=/ip4/0.0.0.0/tcp/9301
      - CORE_FSC_PERSISTENCES_OPTS_DATASOURCE=file:./data/fts.sqlite
    ports:
      - 9300:9000   # FSC API (external 9300 → container 9000)
      - 9301:9301   # P2P websocket
    volumes:
      - ./conf/endorser1:/conf
    working_dir: /conf
    depends_on:
      committer-test-node:
        condition: service_healthy
    networks:
      fabricx:
        aliases:
          - endorser1.example.com

  # ── FSC Endorser 2 ──────────────────────────────────────────────────────────
  endorser2:
    build:
      context: .
      args:
        - NODE_TYPE=endorser
    environment:
      - CORE_FSC_ID=endorser2
      - CORE_P2P_LISTENADDRESS=/ip4/0.0.0.0/tcp/9401
      - CORE_FSC_PERSISTENCES_OPTS_DATASOURCE=file:./data/fts.sqlite
    ports:
      - 9400:9000   # FSC API (external 9400 → container 9000)
      - 9401:9401   # P2P websocket
    volumes:
      - ./conf/endorser2:/conf
    working_dir: /conf
    depends_on:
      committer-test-node:
        condition: service_healthy
    networks:
      fabricx:
        aliases:
          - endorser2.example.com
